# Self-hosted Judge0 code-execution engine for the DSA judge.
#
# Setup:
#   1. Install Docker Desktop.
#   2. cp judge0.conf.example judge0.conf   (edit passwords for production)
#   3. docker compose -f docker-compose.judge0.yml up -d
#   4. In .env set:  JUDGE_PROVIDER=judge0  and  JUDGE0_URL=http://localhost:2358
#   5. Verify:  curl http://localhost:2358/system_info
#
# Judge0 runs code inside `isolate` (cgroups sandbox) — needs privileged mode.

services:
  judge0-server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-db:
    image: postgres:13.0
    env_file: judge0.conf
    volumes:
      - judge0-postgres-data:/var/lib/postgresql/data/
    restart: always

  judge0-redis:
    image: redis:6.0
    command:
      [
        "bash",
        "-c",
        'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"',
      ]
    env_file: judge0.conf
    volumes:
      - judge0-redis-data:/data
    restart: always

volumes:
  judge0-postgres-data:
  judge0-redis-data:
